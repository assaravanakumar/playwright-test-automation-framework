image: mcr.microsoft.com/playwright:v1.49.0-jammy

stages:
  - install
  - test
  - report

variables:
  npm_config_cache: "$CI_PROJECT_DIR/.npm"

cache:
  key:
    files:
      - package-lock.json
  paths:
    - .npm/
    - node_modules/

install:
  stage: install
  script:
    - npm ci --cache .npm --prefer-offline
  artifacts:
    paths:
      - node_modules/
    expire_in: 1 hour

# Cross-browser + API suites run as parallel jobs (parallel execution / cross-browser testing).
.test_base:
  stage: test
  needs: ["install"]
  script:
    - npx playwright test --project=$BROWSER
  artifacts:
    when: always
    expire_in: 7 days
    paths:
      - playwright-report/
      - test-results/
    reports:
      junit: test-results/junit.xml

test:chromium:
  extends: .test_base
  variables:
    BROWSER: chromium

test:firefox:
  extends: .test_base
  variables:
    BROWSER: firefox

test:webkit:
  extends: .test_base
  variables:
    BROWSER: webkit

test:api:
  extends: .test_base
  variables:
    BROWSER: api

pages:
  stage: report
  needs:
    - test:chromium
    - test:firefox
    - test:webkit
    - test:api
  script:
    - mkdir -p public
    - cp -r playwright-report/* public/ || true
  artifacts:
    paths:
      - public
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
